version: "3.9"

services:
  # ─── PostgreSQL ─────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: job_copilot_db
    environment:
      POSTGRES_USER: copilot
      POSTGRES_PASSWORD: copilot
      POSTGRES_DB: job_copilot
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U copilot -d job_copilot"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── FastAPI Backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: job_copilot_backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://copilot:copilot@db:5432/job_copilot
      ALLOWED_ORIGINS: '["http://localhost:3000","http://frontend:3000"]'
    volumes:
      - ./backend:/app
      - upload_data:/tmp/uploads
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "
        echo 'Waiting for DB...' &&
        python -c 'from app.db.base import Base; from app.db.session import engine; import app.models; Base.metadata.create_all(bind=engine); print(\"Tables created\")' &&
        python seed/seed.py &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Next.js Frontend ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: job_copilot_frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  upload_data:
